name: Issue Auto-Responder

on:
  issues:
    types: [opened]

jobs:
  auto-respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Assign and comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue   = context.payload.issue;
            const opener  = issue.user.login;
            const issueNo = issue.number;
            const repo    = context.repo;

            // 1. Assign the issue to whoever opened it
            await github.rest.issues.addAssignees({
              owner:           repo.owner,
              repo:            repo.repo,
              issue_number:    issueNo,
              assignees:       [opener],
            });

            // 2. Post a welcome comment
            await github.rest.issues.createComment({
              owner:        repo.owner,
              repo:         repo.repo,
              issue_number: issueNo,
              body: `Hey @${opener}! 👋

Thanks for opening this issue — you've been **auto-assigned** to it.

Before you start coding, please read the quick checklist:

- [ ] Check that no existing issue already covers this idea
- [ ] Review the [Contribution Guide](../blob/main/CONTRIBUTING.md) before opening a PR
- [ ] Add your files **only** inside \`submissions/examples/your-feature-name/\`
- [ ] Include \`demo.html\` · \`style.css\` · \`README.md\` in your folder
- [ ] **Maximum 2 active issues per contributor** — please unassign others before taking new ones

> 🕑 **Inactivity rule:** Issues with no progress for **5 days** will be unassigned and reopened for others.

The maintainer will review your PR once it's submitted. Good luck! ⚡`,
            });
